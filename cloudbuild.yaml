steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/ole-agent/telegram-bot:$COMMIT_SHA', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/ole-agent/telegram-bot:$COMMIT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ole-telegram-bot'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/ole-agent/telegram-bot:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--min-instances=1'
      - '--max-instances=1'
      - '--concurrency=1'
      - '--set-env-vars=WEBHOOK_URL=$_WEBHOOK_URL,LINKEDIN_ORG_ID=125564340,SCHEDULER_SECRET=$_SCHEDULER_SECRET,OLE_DATA_DIR=/app/data,AUTHORIZED_CHAT_ID=$_AUTHORIZED_CHAT_ID'
      - '--set-secrets=TELEGRAM_BOT_TOKEN=telegram-bot-token:latest,LINKEDIN_ACCESS_TOKEN=linkedin-access-token:latest,STITCH_API_KEY=stitch-api-key:latest'
      - '--service-account=$_SERVICE_ACCOUNT'
substitutions:
  _WEBHOOK_URL: 'https://ole-telegram-bot-937426126845.us-central1.run.app'
  _SCHEDULER_SECRET: 'ole-scheduler-2024'
  _SERVICE_ACCOUNT: 'ole-telegram-bot@linkedin-agent-501504.iam.gserviceaccount.com'
  _AUTHORIZED_CHAT_ID: '8715063123'
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/ole-agent/telegram-bot:$COMMIT_SHA'
